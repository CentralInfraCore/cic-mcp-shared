---
title: System Architecture Overview — cic-mcp-shared
description: >
  Provides a high-level overview of the cic-mcp-shared component's architecture and
  its role within the cic-mcp-* family.

concepts:
  - name: The "Shared layer" concept
    summary: >
      This component merges multiple sessions, identifies recurring concepts, weighting
      and promotion candidates — never the first source of truth, never canonical.
    component_map:
      - id: cic-mcp-knowledge
        role: reviewed/canonical knowledge, versioned
      - id: cic-mcp-workdir
        role: "current repo/worktree/branch/diff (role filled by cic-factory)"
      - id: cic-mcp-session
        role: session-scope event, timeline, chunk, retrieval, provenance
      - id: cic-mcp-shared
        role: "cross-session memory, weighting, conflict — THIS REPO"
      - id: cic-mcp-gateway
        role: trust-domain aware context compiler
      - id: cic-mcp-factory
        role: the family's capability production/maintenance factory

  - name: Boundaries
    summary: What belongs to the shared layer's responsibility, and what does not.
    yes:
      - merging multiple sessions
      - factory job/PR/artifact linkage
      - identifying recurring concepts
      - weighting
      - conflict/superseded candidates
      - promotion candidates
    no:
      - being the first source of truth for raw hook ingestion
      - canonical layer

  - name: Trust model
    summary: The shared layer's trust marking.
    trust:
      level: mixed / candidate / reviewed_shared
      canonical: false   # by default

  - name: Planned data flow (not yet implemented)
    summary: >
      cic-mcp-session catalog -> cross-session aggregation -> weighting -> conflict/superseded
      -> promotion_candidate -> human review -> cic-mcp-knowledge.
    diagram: |
      graph TD
          A[cic-mcp-session catalog] --> B[shared: cross-session aggregation]
          B --> C[shared: weighting / recurring concepts]
          C --> D[shared: conflict / superseded candidates]
          D --> E[shared: promotion_candidate]
          E -- human review --> F[cic-mcp-knowledge - canonical]
    capability_job_order:
      - shared-session-catalog-consumer-001
      - shared-cross-session-search-001
      - shared-weighting-model-001

  - name: Current state
    summary: >
      The repo was bootstrapped from the base-repo mcp/main MCP server scaffold
      (2026-06-20); no shared-specific content is implemented yet.
