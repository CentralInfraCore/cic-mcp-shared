---
title: Rendszer Architektúra Áttekintés — cic-mcp-shared
description: >
  A cic-mcp-shared komponens magas szintű architektúráját és a cic-mcp-* családban
  betöltött szerepét mutatja be.

concepts:
  - name: A "Shared réteg" koncepció
    summary: >
      Ez a komponens több session-t fűz össze, visszatérő fogalmakat, súlyozást és
      promotion-kandidátusokat jelöl ki — sosem első igazságforrás, sosem canonical.
    component_map:
      - id: cic-mcp-knowledge
        role: reviewed/canonical tudás, verziózott
      - id: cic-mcp-workdir
        role: "aktuális repo/worktree/branch/diff (= cic-factory szerepe)"
      - id: cic-mcp-session
        role: session-scope event, timeline, chunk, retrieval, provenance
      - id: cic-mcp-shared
        role: "cross-session memória, súlyozás, konfliktus — EZ A REPO"
      - id: cic-mcp-gateway
        role: trust-domain aware context compiler
      - id: cic-mcp-factory
        role: a család capability gyártó/karbantartó factory-ja

  - name: Fő határok
    summary: Mi tartozik a shared réteg felelősségébe, és mi nem.
    yes:
      - több session összefűzése
      - factory job/PR/artifact kapcsolás
      - visszatérő fogalmak azonosítása
      - súlyozás
      - konfliktus/superseded jelöltek
      - promotion candidates
    no:
      - raw hook ingestion első igazságforrása
      - canonical layer

  - name: Trust modell
    summary: A shared réteg trust-jelölése.
    trust:
      level: mixed / candidate / reviewed_shared
      canonical: false   # by default

  - name: Tervezett adatfolyam (még nem implementált)
    summary: >
      cic-mcp-session catalog -> cross-session aggregation -> weighting -> conflict/superseded
      -> promotion_candidate -> human review -> cic-mcp-knowledge.
    diagram: |
      graph TD
          A[cic-mcp-session catalog] --> B[shared: cross-session aggregation]
          B --> C[shared: weighting / recurring concepts]
          C --> D[shared: conflict / superseded candidates]
          D --> E[shared: promotion_candidate]
          E -- human review --> F[cic-mcp-knowledge - canonical]
    capability_job_order:
      - shared-session-catalog-consumer-001
      - shared-cross-session-search-001
      - shared-weighting-model-001

  - name: Jelenlegi állapot
    summary: >
      A repo a base-repo mcp/main MCP-szerver scaffold-jából lett bootstrapelve
      (2026-06-20), shared-specifikus tartalom még nincs implementálva.
